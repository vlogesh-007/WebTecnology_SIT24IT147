<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | LOGESH V Portfolio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background-image:url("https://images.unsplash.com/photo-1441974231531-c6227db76b6e?fm=jpg&q=80&w=1920");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.overlay{
    background:rgba(0,0,0,0.45);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:380px;
    padding:40px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(8px);
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.login-box h1{
    color:#FFD700;
    font-size:42px;
    margin-bottom:10px;
}

.login-box p{
    color:white;
    margin-bottom:25px;
}

.login-box input{
    width:100%;
    padding:14px;
    margin:12px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
    outline:none;
}

.login-box button{
    width:100%;
    padding:14px;
    margin-top:15px;
    background:#8B4513;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.login-box button:hover{
    background:#A0522D;
    transform:scale(1.03);
}

.links{
    margin-top:20px;
}

.links a{
    color:#FFD700;
    text-decoration:none;
    font-size:16px;
}

.links a:hover{
    color:white;
}

</style>

</head>

<body>

<div class="overlay">

<div class="login-box">

<h1>Welcome</h1>

<p>Please Login to Continue</p>

<form action="index.html">

<input type="text" placeholder="Username or Email" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="links">

<a href="#">Forgot Password?</a>

<br><br>

<a href="#">Create New Account</a>

</div>

</div>

</div>

</body>
</html>
